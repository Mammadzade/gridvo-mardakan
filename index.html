<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gridvo — Склад Мардакян</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#F0EFEC;color:#1A1A1A;min-height:100vh}
:root{--gold:#C9A84C;--gold-light:#F5EDD6;--dark:#1A1A1A;--mid:#6B7280;--border:#E5E3DF;--red:#EF4444;--green:#22C55E;--red-bg:#FEE2E2;--green-bg:#DCFCE7;--blue-bg:#DBEAFE;--amber-bg:#FEF3C7;--sidebar:250px;}
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#1A1A1A}
.auth-box{background:#fff;border-radius:16px;padding:40px;width:380px;box-shadow:0 8px 40px rgba(0,0,0,0.3)}
.auth-logo{font-size:24px;font-weight:800;margin-bottom:4px}
.auth-logo span{color:var(--gold)}
.auth-sub{font-size:13px;color:var(--mid);margin-bottom:28px}
.auth-tabs{display:flex;gap:0;margin-bottom:24px;background:#F0EFEC;border-radius:8px;padding:3px}
.auth-tab{flex:1;padding:8px;border:none;background:none;cursor:pointer;border-radius:6px;font-size:13px;font-weight:600;color:var(--mid)}
.auth-tab.active{background:#fff;color:#1A1A1A;box-shadow:0 1px 4px rgba(0,0,0,0.1)}
#app{display:none;min-height:100vh}
.topbar{background:#BFDBFE;color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:fixed;top:0;left:0;right:0;z-index:200}
.topbar-logo{font-size:16px;font-weight:800;color:#1A1A1A}
.topbar-logo span{color:var(--gold)}
.topbar-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;color:#1A1A1A}
.topbar-role{font-size:11px;background:var(--gold);color:#fff;padding:2px 8px;border-radius:99px;font-weight:600}
.btn-excel{padding:7px 12px;border-radius:7px;border:none;cursor:pointer;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:4px}
.btn-excel-imp{background:#1D6F42;color:#fff}
.dropdown-item{display:block;width:100%;padding:12px 16px;text-align:left;background:none;border:none;cursor:pointer;font-size:14px;color:#1A1A1A;transition:background .15s}
.dropdown-item:hover{background:#F3F4F6}
.btn-excel-exp{background:#217346;color:#fff}
.sidebar{position:fixed;top:56px;left:0;bottom:0;width:var(--sidebar);background:#fff;border-right:1px solid var(--border);overflow-y:auto;z-index:100;padding:12px 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;cursor:pointer;border:none;background:none;width:100%;text-align:left;font-family:'Inter',sans-serif;margin:1px 8px;width:calc(100% - 16px)}
.nav-item:hover{background:#F0EFEC}
.nav-item.active{background:var(--gold-light)}
.nav-icon{width:34px;height:34px;border-radius:8px;background:#F0EFEC;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.nav-item.active .nav-icon{background:var(--gold);color:#fff}
.nav-text{font-size:13px;font-weight:600;color:#1A1A1A}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;border-radius:99px;font-size:11px;font-weight:700;padding:1px 7px}
.main-content{margin-top:56px;margin-left:var(--sidebar);padding:24px;min-height:calc(100vh - 56px)}
.card{background:#fff;border-radius:12px;padding:22px;box-shadow:0 1px 4px rgba(0,0,0,0.06);margin-bottom:20px}
.page-title{font-size:20px;font-weight:800;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.btn{padding:9px 18px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:opacity .15s;display:inline-flex;align-items:center;gap:6px;font-family:'Inter',sans-serif}
.btn:hover{opacity:.85}
.btn-primary{background:var(--gold);color:#fff}
.btn-secondary{background:#F3F4F6;color:#374151}
.btn-danger{background:var(--red-bg);color:var(--red)}
.btn-success{background:var(--green-bg);color:#166534}
.btn-sm{padding:6px 12px;font-size:12px}
.input{width:100%;padding:10px 12px;border-radius:8px;border:1.5px solid var(--border);font-size:13px;font-family:'Inter',sans-serif;outline:none;background:#fff;transition:border-color .15s}
.input:focus{border-color:var(--gold)}
.select{width:100%;padding:10px 12px;border-radius:8px;border:1.5px solid var(--border);font-size:13px;font-family:'Inter',sans-serif;background:#fff;outline:none}
.label{font-size:12px;font-weight:600;color:var(--mid);margin-bottom:5px;display:block}
.form-row{margin-bottom:14px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.table-wrap{overflow-x:auto}
.table{width:100%;border-collapse:collapse;font-size:13px}
.table th{text-align:left;padding:10px 14px;border-bottom:2px solid #F0EFEC;color:var(--mid);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
.table td{padding:11px 14px;border-bottom:1px solid #F9F8F6;vertical-align:middle}
.table tr:hover td{background:#FAFAF9}
.badge{padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;display:inline-flex;align-items:center;gap:4px}
.badge-green{background:var(--green-bg);color:#166534}
.badge-red{background:var(--red-bg);color:#991B1B}
.badge-blue{background:var(--blue-bg);color:#1E40AF}
.badge-amber{background:var(--amber-bg);color:#92400E}
.badge-gray{background:#F3F4F6;color:var(--mid)}
.badge-gold{background:var(--gold-light);color:#92400E}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:12px;padding:16px;border-left:4px solid var(--gold);box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.stat-num{font-size:28px;font-weight:800;line-height:1}
.stat-label{font-size:12px;color:var(--mid);margin-top:4px;font-weight:500}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:16px;padding:28px;width:min(600px,100%);max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,0.2)}
.modal-lg{width:min(780px,100%)}
.modal-title{font-size:17px;font-weight:800;margin-bottom:20px}
.modal-footer{display:flex;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border);flex-wrap:wrap}
.photos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(76px,1fr));gap:8px}
.photo-thumb{width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px;cursor:pointer;border:2px solid transparent}
.photo-thumb:hover{border-color:var(--gold)}
.photo-upload-btn{width:100%;aspect-ratio:1;border:2px dashed var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--mid);font-size:22px;background:none}
.photo-upload-btn:hover{border-color:var(--gold);color:var(--gold)}
.task-card{background:#fff;border-radius:12px;padding:16px;border-left:4px solid var(--gold);box-shadow:0 1px 4px rgba(0,0,0,0.06);margin-bottom:12px;cursor:pointer;transition:box-shadow .15s}
.task-card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.1)}
.task-card.new{border-color:var(--red)}
.task-card.done{opacity:.65}
.cargo-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding:10px;background:#F9F8F6;border-radius:8px}
.cargo-num{width:34px;height:34px;border-radius:8px;background:var(--gold);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.progress-bar{height:7px;background:#F0EFEC;border-radius:99px;overflow:hidden;margin:8px 0}
.progress-fill{height:100%;background:var(--gold);border-radius:99px;transition:width .3s}
.progress-fill.done{background:var(--green)}
.scanner-box{background:#1A1A1A;border-radius:12px;padding:18px;margin-bottom:14px}
.scanner-input{background:#2A2A2A;border:2px solid #444;color:#fff;font-size:16px;font-family:monospace;text-align:center}
.scanner-input:focus{border-color:var(--gold)}
.scan-ok{background:var(--green-bg);border:2px solid #22C55E;border-radius:8px;padding:12px;margin-top:10px;font-size:13px}
.scan-err{background:var(--red-bg);border:2px solid var(--red);border-radius:8px;padding:12px;margin-top:10px;font-size:13px}
.status-ok{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:var(--green-bg);color:#166534;font-size:13px;font-weight:700}
.status-err{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:var(--red-bg);color:#991B1B;font-size:13px;font-weight:700}
.status-pend{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:var(--amber-bg);color:#92400E;font-size:12px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1A1A1A;color:#fff;padding:11px 22px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,0.25);transition:opacity .3s;max-width:380px;text-align:center}
.toast.error{background:#B91C1C}
.toast.success{background:#166534}
.toast.hidden{opacity:0}
.info-box{background:#F9F8F6;border-radius:8px;padding:12px;font-size:13px;margin-bottom:14px}
@media(max-width:768px){
  .sidebar{width:100%;top:auto;bottom:0;height:64px;border-left:none;border-top:1px solid var(--border);display:flex;overflow-x:auto;padding:6px;flex-direction:row;align-items:center}
  .nav-item{flex-direction:column;gap:2px;padding:6px;min-width:60px;width:auto;margin:0 2px}
  .nav-text{font-size:10px}
  .nav-icon{width:26px;height:26px;font-size:13px}
  .main-content{margin-right:0;margin-bottom:70px;padding:16px}
  .form-grid{grid-template-columns:1fr}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .topbar-right .btn-excel{display:none}
}
@media print{.sidebar,.topbar,.no-print{display:none!important}.main-content{margin:0!important;padding:20px!important}}
</style>
</head>
<body>
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">Grid<span>vo</span></div>
    <div class="auth-sub">Склад Мардакян — система управления</div>
    <div style="margin-bottom:20px;font-size:13px;color:var(--mid)">Войдите в систему</div>
    <div id="login-form">
      <div class="form-row"><label class="label">Email</label><input class="input" id="login-email" type="email" placeholder="your@email.com"/></div>
      <div class="form-row"><label class="label">Пароль</label><input class="input" id="login-pass" type="password" placeholder="••••••••"/></div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:4px" onclick="login()">Войти →</button>
    </div>
    </div>
</div>

<div id="app">
  <div class="topbar no-print">
    <div class="topbar-logo">Grid<span>vo</span> <span style="font-weight:400;opacity:.4;font-size:11px">Мардакян</span></div>
    <div class="topbar-right">
      <span id="header-username" style="font-size:13px;color:#1A1A1A"></span>
      <span class="topbar-role" id="header-role" style="cursor:pointer" onclick="openRoleSwitcher()" title="Нажмите для смены роли"></span>
      <button class="btn btn-sm" style="background:rgba(255,255,255,.12);color:#fff;border:none" onclick="logout()">Выйти</button>
    </div>
  </div>
  <div class="sidebar no-print" id="sidebar"></div>
  <div class="main-content">
    <div id="page-content"></div>
  </div>
</div>
<div id="modal-container"></div>
<div class="toast hidden" id="toast"></div>
<script>const SUPABASE_URL='https://quejehvdjhlktebfwran.supabase.co';const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1ZWplaHZkamhsa3RlYmZ3cmFuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3OTg5ODEsImV4cCI6MjA5NzM3NDk4MX0.i-SrPqwZ5aA5gM5bQa1M-1J0QLgZzyb3Mpo35mZEgJE';const CLOUDINARY_CLOUD='dbnzswigy';const CLOUDINARY_PRESET='mardakan';const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);let currentUser=null,currentRole='warehouse',currentPage='';
function toast(msg,type='success'){const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+type;setTimeout(()=>t.className='toast hidden',3200);}
function fmtDate(iso){if(!iso)return'—';return new Date(iso).toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric'});}
function fmtDT(iso){if(!iso)return'—';return new Date(iso).toLocaleString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});}
function genArticle(n){return((n||'XX').substring(0,3).toUpperCase())+'-'+Date.now().toString().slice(-6);}
function genReqNum(){return'REQ-'+Date.now().toString().slice(-8);}
function openModal(html){document.getElementById('modal-container').innerHTML='<div class="overlay" id="modal-overlay">'+html+'</div>';document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target.id==='modal-overlay')closeModal();});}
function closeModal(){document.getElementById('modal-container').innerHTML='';}
async function getCats(){const{data}=await sb.from('categories').select('*').order('name');return data||[];}
async function getCells(){const{data}=await sb.from('cells').select('*').order('zone').order('row').order('cell');return data||[];}
async function catOpts(){const cats=await getCats();return'<option value="">Все категории</option>'+cats.map(c=>'<option value="'+c.id+'">'+c.name+'</option>').join('');}
async function catOptsReq(){const cats=await getCats();return'<option value="">— выбрать —</option>'+cats.map(c=>'<option value="'+c.id+'">'+c.name+'</option>').join('');}
function switchAuthTab(tab){document.querySelectorAll('.auth-tab').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');document.getElementById('login-form').style.display=tab==='login'?'block':'none';document.getElementById('register-form').style.display=tab==='register'?'block':'none';}
async function login(){const email=document.getElementById('login-email').value.trim();const pass=document.getElementById('login-pass').value;if(!email||!pass){toast('Заполните все поля','error');return;}const{data,error}=await sb.auth.signInWithPassword({email,password:pass});if(error){toast(error.message,'error');return;}await initUser(data.user);}
async function register(){const name=document.getElementById('reg-name').value.trim();const email=document.getElementById('reg-email').value.trim();const pass=document.getElementById('reg-pass').value;const role=document.getElementById('reg-role').value;if(!name||!email||!pass){toast('Заполните все поля','error');return;}const{error}=await sb.auth.signUp({email,password:pass,options:{data:{name,role}}});if(error){toast(error.message,'error');return;}toast('Готово! Войдите в систему.');document.querySelectorAll('.auth-tab')[0].click();}
async function logout(){await sb.auth.signOut();document.getElementById('auth-screen').style.display='flex';document.getElementById('app').style.display='none';}
async function initUser(user){currentUser=user;currentRole=user.user_metadata?.role||'warehouse';updateRoleUI();document.getElementById('auth-screen').style.display='none';document.getElementById('app').style.display='block';buildSidebar();navigateTo(currentRole==='marketing'?'requests':'tasks');}
function updateRoleUI(){const rL={admin:'Администратор',warehouse:'Склад',marketing:'Маркетинг'};document.getElementById('header-username').textContent=currentUser.user_metadata?.name||currentUser.email;const roleEl=document.getElementById('header-role');roleEl.textContent=(rL[currentRole]||currentRole)+(currentUser.user_metadata?.role==='admin'?' ▾':'');}
function openRoleSwitcher(){if(currentUser.user_metadata?.role!=='admin'){toast('Только администратор может менять роль','error');return;}openModal('<div class="modal"><div class="modal-title">👤 Сменить роль</div><div style="display:flex;flex-direction:column;gap:10px"><button class="btn btn-primary" onclick="switchRole(\'admin\')">👑 Администратор</button><button class="btn btn-secondary" onclick="switchRole(\'warehouse\')">🏭 Складчик</button><button class="btn btn-secondary" onclick="switchRole(\'marketing\')">📣 Маркетинг</button></div><div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Отмена</button></div></div>');}
function switchRole(role){currentRole=role;updateRoleUI();buildSidebar();closeModal();const startPage=role==='marketing'?'requests':role==='warehouse'?'tasks':'dashboard';navigateTo(startPage);toast('Роль: '+(role==='admin'?'Администратор':role==='warehouse'?'Складчик':'Маркетинг'));}
async function buildSidebar(){const{data:newTasks}=await sb.from('tasks').select('type,status').eq('status','Новая');const counts={receipt:0,shipment:0,writeoff:0};(newTasks||[]).forEach(t=>{if(counts[t.type]!==undefined)counts[t.type]++;});const menus={admin:[{id:'dashboard',icon:'📊',label:'Дашборд'},{id:'tasks',icon:'✅',label:'Задачи'},{id:'products',icon:'📦',label:'Содержимое'},{id:'receipt',icon:'📥',label:'Приёмка'},{id:'placement',icon:'📍',label:'Размещение'},{id:'picking',icon:'🔍',label:'Подбор'},{id:'shipment',icon:'📤',label:'Отгрузка'},{id:'move',icon:'🔄',label:'Перемещение'},{id:'writeoff',icon:'🗑️',label:'Списание'},{id:'cells',icon:'🗃️',label:'Ячейки'},{id:'categories',icon:'🏷️',label:'Категории'},{id:'invoices',icon:'📋',label:'Накладные'},{id:'analytics',icon:'📈',label:'Аналитика'},{id:'rollback',icon:'↩️',label:'Откат'},{id:'users',icon:'👥',label:'Пользователи'}],warehouse:[{id:'tasks',icon:'✅',label:'Мои задачи'},{id:'products',icon:'📦',label:'Содержимое'},{id:'receipt',icon:'📥',label:'Приёмка'},{id:'placement',icon:'📍',label:'Размещение'},{id:'picking',icon:'🔍',label:'Подбор'},{id:'shipment',icon:'📤',label:'Отгрузка'},{id:'move',icon:'🔄',label:'Перемещение'},{id:'writeoff',icon:'🗑️',label:'Списание'},{id:'cells',icon:'🗃️',label:'Ячейки'}],marketing:[{id:'requests',icon:'📝',label:'Мои заявки'},{id:'products',icon:'📦',label:'Содержимое'},{id:'new_receipt_req',icon:'📥',label:'Заявка на приёмку'},{id:'new_shipment_req',icon:'🚚',label:'Заявка на отгрузку'},{id:'new_writeoff_req',icon:'🗑️',label:'Заявка на списание'}]};const items=menus[currentRole]||menus.warehouse;document.getElementById('sidebar').innerHTML=items.map(i=>{const cnt=counts[i.id]||0;return'<button class="nav-item" id="nav-'+i.id+'" onclick="navigateTo(\''+i.id+'\')"><div class="nav-icon">'+i.icon+'</div><span class="nav-text">'+i.label+'</span>'+(cnt>0?'<span class="nav-badge">'+cnt+'</span>':'')+'</button>';}).join('');}
function navigateTo(page){currentPage=page;document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));const btn=document.getElementById('nav-'+page);if(btn)btn.classList.add('active');renderPage(page);}
async function renderPage(page){const c=document.getElementById('page-content');c.innerHTML='<div style="color:var(--mid);padding:20px">Загрузка...</div>';const pages={dashboard:renderDashboard,tasks:renderTasks,products:renderProducts,receipt:renderReceipt,placement:renderPlacement,picking:renderPicking,shipment:renderShipment,move:renderMove,writeoff:renderWriteoff,cells:renderCells,categories:renderCategories,invoices:renderInvoices,analytics:renderAnalytics,rollback:renderRollback,users:renderUsers,requests:renderRequests,shipments_view:renderShipmentsView,new_receipt_req:renderNewReceiptReq,new_shipment_req:renderNewShipmentReq,new_writeoff_req:renderNewWriteoffReq};if(pages[page])await pages[page](c);else c.innerHTML='<div class="card">В разработке</div>';}
async function renderDashboard(c){const[{data:prods},{data:tasks},{data:ops}]=await Promise.all([sb.from('products').select('status'),sb.from('tasks').select('status,type'),sb.from('operations').select('type,created_at,executed_by_name').order('created_at',{ascending:false}).limit(12)]);const total=prods?.length||0,inStock=prods?.filter(p=>p.status==='На складе').length||0,writeoff=prods?.filter(p=>p.status==='На списание').length||0,newTasks=tasks?.filter(t=>t.status==='Новая').length||0;const tL={receipt:'Приёмка',shipment:'Отгрузка',placement:'Размещение',move:'Перемещение',writeoff:'Списание'};c.innerHTML='<div class="page-title">📊 Дашборд</div><div class="stat-grid"><div class="stat-card"><div class="stat-num">'+total+'</div><div class="stat-label">Всего товаров</div></div><div class="stat-card" style="border-color:#22C55E"><div class="stat-num">'+inStock+'</div><div class="stat-label">На складе</div></div><div class="stat-card" style="border-color:#EF4444"><div class="stat-num">'+writeoff+'</div><div class="stat-label">На списание</div></div><div class="stat-card" style="border-color:#F59E0B"><div class="stat-num">'+newTasks+'</div><div class="stat-label">Новых задач</div></div></div><div class="card"><div style="font-size:15px;font-weight:700;margin-bottom:14px">Последние операции</div><div class="table-wrap"><table class="table"><thead><tr><th>Тип</th><th>Дата</th><th>Кто</th></tr></thead><tbody>'+(ops||[]).map(o=>'<tr><td><span class="badge badge-gray">'+(tL[o.type]||o.type)+'</span></td><td>'+fmtDT(o.created_at)+'</td><td>'+(o.executed_by_name||'—')+'</td></tr>').join('')+'</tbody></table></div></div>';}
async function renderTasks(c){const{data:tasks}=await sb.from('tasks').select('*,task_items(*)').order('created_at',{ascending:false});const myT=currentRole==='admin'?tasks:(tasks||[]).filter(t=>t.assigned_to===currentRole||t.assigned_to==='all');const tI={receipt:'📥',shipment:'📤',writeoff:'🗑️',placement:'📍'};const tL={receipt:'Приёмка',shipment:'Отгрузка',writeoff:'Списание',placement:'Размещение'};const sC={'Новая':'badge-amber','В работе':'badge-blue','Выполнена':'badge-green','Отменена':'badge-red'};const isAdminRole=currentUser.user_metadata?.role==='admin';const showImportBtn=(currentRole==='admin'||currentRole==='warehouse');c.innerHTML='<div class="page-title">✅ Задачи'+(showImportBtn?'<button class="btn btn-primary btn-sm" onclick="importExcel()">📥 Загрузить</button>':'')+'</div>'+(myT&&myT.length?myT.map(t=>{const total=t.task_items?.length||0,done=t.task_items?.filter(i=>i.is_collected).length||0,pct=total?Math.round((done/total)*100):0;return'<div class="task-card '+(t.status==='Выполнена'?'done':t.status==='Новая'?'new':'')+'" onclick="openTask(\''+t.id+'\')" style="position:relative"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px"><div style="display:flex;align-items:center;gap:10px"><span style="font-size:22px">'+(tI[t.type]||'📋')+'</span><div><div style="font-weight:700;font-size:14px">'+(tL[t.type]||t.type)+' — '+(t.request_number||'—')+'</div><div style="font-size:12px;color:var(--mid)">От: '+(t.created_by_name||'—')+' · '+fmtDT(t.created_at)+'</div></div></div><div style="display:flex;gap:6px;align-items:center"><span class="badge '+(sC[t.status]||'badge-gray')+'">'+t.status+'</span>'+(isAdminRole?'<button class="btn btn-sm btn-danger" data-tid="'+t.id+'" onclick="event.stopPropagation();deleteTask(this.getAttribute(&quot;data-tid&quot;),&quot;tasks&quot;)">🗑️</button>':'')+'</div></div>'+(total?'<div class="progress-bar"><div class="progress-fill '+(done===total?'done':'')+'" style="width:'+pct+'%"></div></div><div style="font-size:12px;color:var(--mid)">Позиций: '+done+'/'+total+'</div>':'')+(t.note?'<div style="font-size:12px;color:var(--mid);margin-top:6px">📝 '+t.note+'</div>':'')+'</div>';}).join(''):'<div class="card" style="text-align:center;color:var(--mid);padding:40px">Задач нет ✓</div>');}
async function openTask(id){const{data:task}=await sb.from('tasks').select('*,task_items(*,products(name,article,cells(label)))').eq('id',id).single();if(!task)return;const tL={receipt:'Приёмка',shipment:'Отгрузка',writeoff:'Списание',placement:'Размещение'};const canWork=currentRole!=='marketing';const sC={'Новая':'badge-amber','В работе':'badge-blue','Выполнена':'badge-green'};openModal('<div class="modal modal-lg"><div class="modal-title">'+(tL[task.type]||task.type)+' — '+task.request_number+'</div><div class="form-grid" style="margin-bottom:14px;font-size:13px"><div>Статус: <span class="badge '+(sC[task.status]||'badge-gray')+'">'+task.status+'</span></div><div>Запросил: <strong>'+(task.created_by_name||'—')+'</strong></div><div>Начато: '+fmtDT(task.started_at)+'</div><div>Завершено: '+fmtDT(task.completed_at)+'</div></div>'+(task.note?'<div class="info-box">📝 '+task.note+'</div>':'')+'<div style="margin-bottom:14px"><div class="label" style="margin-bottom:10px">Позиции</div>'+(task.task_items||[]).map(item=>'<div style="display:flex;align-items:center;gap:10px;padding:10px;background:'+(item.is_collected?'var(--green-bg)':'#F9F8F6')+';border-radius:8px;margin-bottom:8px"><span style="font-size:18px">'+(item.is_collected?'✅':'⬜')+'</span><div style="flex:1"><div style="font-weight:600;font-size:13px">'+(item.products?.name||'—')+'</div><div style="font-size:12px;color:var(--mid)">'+(item.products?.article||'—')+(item.products?.cells?.label?' · 📍 '+item.products.cells.label:'')+'</div></div><div style="font-weight:700;font-size:13px">'+item.quantity_collected+'/'+item.quantity_required+'</div></div>').join('')+'</div>'+(canWork&&task.status!=='Выполнена'?'<div class="scanner-box"><div style="font-size:13px;font-weight:600;color:rgba(255,255,255,.8);margin-bottom:10px">🔍 Сканирование / ввод артикула</div><input class="input scanner-input" id="scan-'+task.id+'" placeholder="Сканируйте или введите артикул..." onkeydown="if(event.key===\'Enter\')processScan(\''+task.id+'\')"/><div style="display:flex;gap:8px;margin-top:10px"><button class="btn btn-primary" style="flex:1" onclick="processScan(\''+task.id+'\')">Подтвердить</button><button class="btn btn-secondary" onclick="openCam(\''+task.id+'\')">📷 Камера</button></div><div id="scan-res-'+task.id+'"></div></div><div class="modal-footer">'+(task.status==='Новая'?'<button class="btn btn-primary" onclick="startTask(\''+task.id+'\')">▶ Начать</button>':'')+'<button class="btn btn-success" onclick="completeTask(\''+task.id+'\')">✓ Завершить</button><button class="btn btn-secondary" onclick="closeModal()">Закрыть</button></div>':'<div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Закрыть</button></div>')+'</div>');setTimeout(()=>{const el=document.getElementById('scan-'+task.id);if(el)el.focus();},100);}
async function startTask(id){await sb.from('tasks').update({status:'В работе',started_at:new Date().toISOString(),executed_by_name:currentUser.user_metadata?.name}).eq('id',id);toast('Задача взята в работу');closeModal();renderPage('tasks');}
async function processScan(taskId){const inp=document.getElementById('scan-'+taskId);const article=(inp?.value||'').trim();if(!article)return;const{data:task}=await sb.from('tasks').select('*,task_items(*,products(*))').eq('id',taskId).single();const item=task.task_items.find(i=>i.products?.article===article&&!i.is_collected);const resDiv=document.getElementById('scan-res-'+taskId);if(!item){const already=task.task_items.find(i=>i.products?.article===article&&i.is_collected);resDiv.innerHTML='<div class="scan-err">❌ '+(already?'Уже отсканирован':'Не найден в задаче')+': <strong>'+article+'</strong></div>';if(inp)inp.value='';return;}const newC=item.quantity_collected+1;const isDone=newC>=item.quantity_required;await sb.from('task_items').update({quantity_collected:newC,is_collected:isDone}).eq('id',item.id);resDiv.innerHTML='<div class="scan-ok">✅ <strong>'+item.products.name+'</strong> — '+newC+'/'+item.quantity_required+'</div>';if(inp){inp.value='';inp.focus();}const{data:all}=await sb.from('task_items').select('*').eq('task_id',taskId);if(all&&all.every(i=>i.is_collected))setTimeout(()=>showCompletionDialog(taskId),600);}
function showCompletionDialog(taskId){openModal('<div class="modal" style="text-align:center;padding:40px"><div style="font-size:56px;margin-bottom:16px">✅</div><div style="font-size:20px;font-weight:800;margin-bottom:8px">Сборка завершена!</div><div style="font-size:14px;color:var(--mid);margin-bottom:24px">Все позиции собраны. Подтвердите завершение.</div><div style="display:flex;gap:10px;justify-content:center"><button class="btn btn-success" style="font-size:15px;padding:12px 28px" onclick="completeTask(\''+taskId+'\')">✓ Подтвердить</button><button class="btn btn-secondary" onclick="closeModal()">← Назад</button></div></div>');}
async function completeTask(id){const now=new Date().toISOString();const{data:task}=await sb.from('tasks').select('*').eq('id',id).single();const mins=task.started_at?Math.round((new Date(now)-new Date(task.started_at))/60000):null;await sb.from('tasks').update({status:'Выполнена',completed_at:now,executed_by_name:currentUser.user_metadata?.name}).eq('id',id);await sb.from('operations').insert({type:task.type,started_at:task.started_at,completed_at:now,duration_minutes:mins,created_by_name:task.created_by_name,executed_by_name:currentUser.user_metadata?.name,note:task.request_number});toast('Задача выполнена! 🎉','success');closeModal();renderPage('tasks');}
function openCam(taskId){openModal('<div class="modal" style="text-align:center"><div class="modal-title">📷 Камера</div><video id="cam-v" style="width:100%;border-radius:10px;background:#000" autoplay playsinline></video><div style="margin-top:14px"><button class="btn btn-secondary" onclick="stopCam();closeModal()">Закрыть</button></div></div>');navigator.mediaDevices?.getUserMedia({video:{facingMode:'environment'}}).then(stream=>{const v=document.getElementById('cam-v');if(v){v.srcObject=stream;window._camStream=stream;}}).catch(()=>{toast('Камера недоступна. Введите вручную.','error');closeModal();});}
function stopCam(){if(window._camStream){window._camStream.getTracks().forEach(t=>t.stop());window._camStream=null;}}
async function renderProducts(c){const{data:products}=await sb.from('products').select('*,categories(name),cells(label),product_photos(url)').neq('status','Ожидает приёмки').order('created_at',{ascending:false});const canEdit=currentRole!=='marketing';c.innerHTML='<div class="page-title">📦 Содержимое<div style="display:flex;gap:8px">'+(canEdit?'<button class="btn btn-primary btn-sm" onclick="openAddProduct()">+ Добавить</button>':'')+'<button class="btn btn-secondary btn-sm" onclick="exportExcel()" title="Скачать">⬇️</button>'+(currentRole==='admin'?'<button class="btn btn-danger btn-sm" onclick="clearAllProducts()">🗑️ Очистить всё</button>':'')+'</div></div><div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap"><input class="input" id="ps" placeholder="Поиск..." style="max-width:260px" oninput="filterProds()"/><select class="select" id="pct" style="max-width:180px" onchange="filterProds()"><option value="">Все категории</option></select><select class="select" id="pst" style="max-width:160px" onchange="filterProds()"><option value="">Все статусы</option><option>На складе</option><option>На списание</option><option>Отгружен</option></select></div><div id="prod-list"></div>';window._prods=products||[];const cats=await getCats();const sel=document.getElementById('pct');if(sel)cats.forEach(cat=>{const o=document.createElement('option');o.value=cat.id;o.textContent=cat.name;sel.appendChild(o);});filterProds();}
function filterProds(){const s=(document.getElementById('ps')?.value||'').toLowerCase();const cat=document.getElementById('pct')?.value||'';const st=document.getElementById('pst')?.value||'';const f=(window._prods||[]).filter(p=>(!s||p.name.toLowerCase().includes(s)||(p.article||'').toLowerCase().includes(s))&&(!cat||p.category_id===cat)&&(!st||p.status===st));const el=document.getElementById('prod-list');if(!f.length){el.innerHTML='<div class="card" style="color:var(--mid);text-align:center;padding:30px">Не найдено</div>';return;}el.innerHTML='<div class="card"><div class="table-wrap"><table class="table"><thead><tr><th>Фото</th><th>Артикул</th><th>Название</th><th>Категория</th><th>Ячейка</th><th>Статус</th><th></th></tr></thead><tbody>'+f.map(p=>'<tr><td>'+(p.product_photos?.[0]?'<img src="'+p.product_photos[0].url+'" style="width:38px;height:38px;object-fit:cover;border-radius:6px"/>'+'':'—')+'</td><td style="font-family:monospace;font-size:12px;color:var(--mid)">'+p.article+'</td><td style="font-weight:600">'+p.name+'</td><td>'+(p.categories?.name||'—')+'</td><td>'+(p.cells?.label?'<span class="badge badge-blue">'+p.cells.label+'</span>':'—')+'</td><td><span class="badge '+(p.status==='На складе'?'badge-green':p.status==='На списание'?'badge-red':'badge-gray')+'">'+p.status+'</span></td><td><button class="btn btn-sm btn-secondary" onclick="openProductDetail(\''+p.id+'\')">Открыть</button></td></tr>').join('')+'</tbody></table></div></div>';}
async function openProductDetail(id){const{data:p}=await sb.from('products').select('*,categories(name),cells(label),product_photos(*),cargo_places(*)').eq('id',id).single();if(!p)return;const canEdit=currentRole!=='marketing';openModal('<div class="modal modal-lg"><div class="modal-title">📦 '+p.name+'</div><div class="form-grid" style="margin-bottom:14px;font-size:13px"><div>Артикул: <strong style="font-family:monospace">'+p.article+'</strong></div><div>Категория: <strong>'+(p.categories?.name||'—')+'</strong></div><div>Ячейка: <strong>'+(p.cells?.label||'Не размещён')+'</strong></div><div>Состояние: <strong>'+(p.condition||'—')+'</strong></div><div>Статус: <span class="badge '+(p.status==='На складе'?'badge-green':p.status==='На списание'?'badge-red':'badge-gray')+'">'+p.status+'</span></div><div>Кол-во: <strong>'+(p.quantity||1)+'</strong></div></div>'+((p.length_cm||p.width_cm||p.height_cm||p.weight_kg)?'<div class="info-box">📐 '+[p.length_cm&&'Д:'+p.length_cm+'см',p.width_cm&&'Ш:'+p.width_cm+'см',p.height_cm&&'В:'+p.height_cm+'см',p.weight_kg&&'Вес:'+p.weight_kg+'кг'].filter(Boolean).join(' · ')+'</div>':'')+(p.description?'<div class="info-box">'+p.description+'</div>':'')+'<div style="margin-bottom:14px"><div class="label">Штрихкод</div><svg id="bc-'+p.id+'" style="max-width:200px"></svg></div><div style="margin-bottom:14px"><div class="label">Фото</div><div class="photos-grid">'+(p.product_photos||[]).map(ph=>'<img src="'+ph.url+'" class="photo-thumb" onclick="window.open(\''+ph.url+'\',\'_blank\')"/>').join('')+(canEdit?'<button class="photo-upload-btn" onclick="uploadPhoto(\''+p.id+'\')">+</button>':'')+'</div></div>'+(p.cargo_places?.length?'<div style="margin-bottom:14px"><div class="label">Грузоместа ('+p.cargo_places.length+')</div>'+p.cargo_places.map(cp=>'<div class="cargo-row"><div class="cargo-num">'+cp.place_number+'</div><div style="flex:1;font-size:13px">'+(cp.description||'—')+'</div><span class="badge '+(cp.is_scanned?'badge-green':'badge-gray')+'">'+(cp.is_scanned?'Принято':'Ожидает')+'</span></div>').join('')+'</div>':'')+'<div class="modal-footer">'+(canEdit?'<button class="btn btn-primary" onclick="openEditProduct(\''+p.id+'\')">Редактировать</button>':'')+'<button class="btn btn-secondary" onclick="printBarcode(\''+p.article+'\',\''+p.name.replace(/'/g,'')+'\')">🖨️ Штрихкод</button><button class="btn btn-secondary" onclick="closeModal()">Закрыть</button></div></div>');setTimeout(()=>{try{JsBarcode('#bc-'+p.id,p.article,{width:2,height:55,displayValue:true,fontSize:12});}catch(e){}},100);}
function printBarcode(article,name){const w=window.open('','_blank');w.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"/><script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"><\/script></head><body style="text-align:center;padding:20px;font-family:Arial"><div style="font-size:13px;font-weight:bold;margin-bottom:6px">'+name+'</div><svg id="bc"></svg><script>JsBarcode(\'#bc\',\''+article+'\',{width:2,height:80,displayValue:true});window.print();window.close();<\/script></body></html>');w.document.close();}
async function uploadPhoto(productId){const input=document.createElement('input');input.type='file';input.accept='image/*';input.multiple=true;input.onchange=async()=>{for(const file of input.files){const fd=new FormData();fd.append('file',file);fd.append('upload_preset',CLOUDINARY_PRESET);const res=await fetch('https://api.cloudinary.com/v1_1/'+CLOUDINARY_CLOUD+'/image/upload',{method:'POST',body:fd});const json=await res.json();if(json.secure_url)await sb.from('product_photos').insert({product_id:productId,url:json.secure_url});}toast('Фото загружены!');closeModal();openProductDetail(productId);};input.click();}
async function openAddProduct(){const cats=await getCats();openModal('<div class="modal modal-lg"><div class="modal-title">+ Новый товар</div><div class="form-grid"><div class="form-row"><label class="label">Название *</label><input class="input" id="pn" placeholder="Диван Milano"/></div><div class="form-row"><label class="label">Категория *</label><select class="select" id="pcat" onchange="updArt()"><option value="">— выбрать —</option>'+cats.map(c=>'<option value="'+c.id+'">'+c.name+'</option>').join('')+'</select></div></div><div class="form-row"><label class="label">Артикул</label><div style="display:flex;gap:8px"><input class="input" id="part" style="font-family:monospace" readonly/><button class="btn btn-secondary btn-sm" onclick="regenArt()">🔄</button></div></div><div class="form-grid"><div class="form-row"><label class="label">Состояние</label><select class="select" id="pcond"><option>Новый</option><option>Б/у — хорошее</option><option>Б/у — удовлетворительное</option><option>Повреждён</option></select></div><div class="form-row"><label class="label">Статус</label><select class="select" id="pstat"><option>На складе</option><option>На списание</option></select></div></div><div class="form-row"><label class="label">Количество</label><input class="input" id="pqty" type="number" value="1" min="1" style="max-width:110px"/></div><div class="form-row"><label class="label">Описание</label><textarea class="input" id="pdesc" rows="2" style="resize:vertical"></textarea></div><div class="info-box" style="margin-bottom:14px"><div class="label" style="margin-bottom:8px">📐 Габариты (необязательно)</div><div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px"><div><label class="label">Длина</label><input class="input" id="pl" type="number"/></div><div><label class="label">Ширина</label><input class="input" id="pw" type="number"/></div><div><label class="label">Высота</label><input class="input" id="ph" type="number"/></div><div><label class="label">Вес кг</label><input class="input" id="pkg" type="number"/></div></div></div><div class="info-box" style="margin-bottom:14px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px"><div class="label" style="margin-bottom:0">📦 Грузоместа</div><button class="btn btn-sm btn-secondary" onclick="addCargo()">+ Добавить место</button></div><div id="cargo-rows"></div></div><div class="form-row"><label class="label">Фото</label><input type="file" id="pf" accept="image/*" multiple class="input" style="padding:7px"/></div><div class="modal-footer"><button class="btn btn-primary" onclick="saveProduct()">Сохранить товар</button><button class="btn btn-secondary" onclick="closeModal()">Отмена</button></div></div>');window._cargo=0;}
function updArt(){const sel=document.getElementById('pcat');const opt=sel.options[sel.selectedIndex];if(opt.value)document.getElementById('part').value=genArticle(opt.text);}

async function saveProduct(){const name=document.getElementById('pn').value.trim();const cat=document.getElementById('pcat').value;const article=document.getElementById('part').value.trim();if(!name||!cat||!article){toast('Заполните обязательные поля','error');return;}const{data:prod,error}=await sb.from('products').insert({name,category_id:cat,article,condition:document.getElementById('pcond').value,status:document.getElementById('pstat').value,quantity:parseInt(document.getElementById('pqty').value)||1,description:document.getElementById('pdesc').value,length_cm:parseFloat(document.getElementById('pl').value)||null,width_cm:parseFloat(document.getElementById('pw').value)||null,height_cm:parseFloat(document.getElementById('ph').value)||null,weight_kg:parseFloat(document.getElementById('pkg').value)||null}).select().single();if(error){toast(error.message,'error');return;}const total=window._cargo||0;for(let i=1;i<=total;i++){const row=document.getElementById('cr-'+i);if(!row)continue;await sb.from('cargo_places').insert({product_id:prod.id,place_number:i,total_places:total,description:document.getElementById('cd-'+i)?.value||''});}const files=document.getElementById('pf').files;for(const file of files){const fd=new FormData();fd.append('file',file);fd.append('upload_preset',CLOUDINARY_PRESET);const res=await fetch('https://api.cloudinary.com/v1_1/'+CLOUDINARY_CLOUD+'/image/upload',{method:'POST',body:fd});const json=await res.json();if(json.secure_url)await sb.from('product_photos').insert({product_id:prod.id,url:json.secure_url});}toast('Товар добавлен!');closeModal();renderPage('products');}
async function openEditProduct(id){const{data:p}=await sb.from('products').select('*').eq('id',id).single();const cats=await getCats();openModal('<div class="modal"><div class="modal-title">Редактировать</div><div class="form-row"><label class="label">Название</label><input class="input" id="en" value="'+p.name+'"/></div><div class="form-row"><label class="label">Категория</label><select class="select" id="ec">'+cats.map(c=>'<option value="'+c.id+'"'+(c.id===p.category_id?' selected':'')+'>'+c.name+'</option>').join('')+'</select></div><div class="form-grid"><div class="form-row"><label class="label">Состояние</label><select class="select" id="econd">'+['Новый','Б/у — хорошее','Б/у — удовлетворительное','Повреждён'].map(v=>'<option'+(v===p.condition?' selected':'')+'>'+v+'</option>').join('')+'</select></div><div class="form-row"><label class="label">Статус</label><select class="select" id="es">'+['На складе','На списание','Отгружен'].map(v=>'<option'+(v===p.status?' selected':'')+'>'+v+'</option>').join('')+'</select></div></div><div class="form-row"><label class="label">Кол-во</label><input class="input" id="eq" type="number" value="'+(p.quantity||1)+'" style="max-width:110px"/></div><div class="form-row"><label class="label">Описание</label><textarea class="input" id="ed" rows="2" style="resize:vertical">'+(p.description||'')+'</textarea></div><div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:14px"><div><label class="label">Длина</label><input class="input" id="el" type="number" value="'+(p.length_cm||'')+'"/></div><div><label class="label">Ширина</label><input class="input" id="ew" type="number" value="'+(p.width_cm||'')+'"/></div><div><label class="label">Высота</label><input class="input" id="eh" type="number" value="'+(p.height_cm||'')+'"/></div><div><label class="label">Вес кг</label><input class="input" id="ekg" type="number" value="'+(p.weight_kg||'')+'"/></div></div><div class="modal-footer"><button class="btn btn-primar async function renderReceipt(c){const{data:tasks}=await sb.from('tasks').select('*,task_items(*,products(name,article))').eq('type','receipt').order('created_at',{ascending:false});const sC={'Новая':'badge-amber','В работе':'badge-blue','Выполнена':'badge-green','Отменена':'badge-red'};const newCount=(tasks||[]).filter(t=>t.status==='Новая').length;const isAdmin=currentUser.user_metadata?.role==='admin';let html='<div class="page-title">📥 Приёмка';if(newCount>0)html+=' <span class="badge badge-red">'+newCount+' новых</span>';html+='</div>';if(tasks&&tasks.length){tasks.forEach(function(t){const tid=t.id;html+='<div class="task-card '+(t.status==='Выполнена'?'done':t.status==='Новая'?'new':'')+'" onclick="openReceiptTask(this.dataset.id)" data-id="'+tid+'">';html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';html+='<div><div style="font-weight:700;font-size:14px">Приёмка — '+t.request_number+'</div>';html+='<div style="font-size:12px;color:var(--mid)">От: '+(t.created_by_name||'—')+' · '+fmtDT(t.created_at)+'</div></div>';html+='<div style="display:flex;gap:6px;align-items:center">';html+='<span class="badge '+(sC[t.status]||'badge-gray')+'">'+t.status+'</span>';if(isAdmin)html+='<button class="btn btn-sm btn-danger" onclick="event.stopPropagation()" data-action="delete" data-tid="'+tid+'">🗑️</button>';html+='</div></div>';if(t.task_items&&t.task_items.length)html+='<div style="font-size:12px;color:var(--mid)">Товаров: '+t.task_items.length+'</div>';if(t.note)html+='<div style="font-size:12px;color:var(--mid);margin-top:4px">📝 '+t.note+'</div>';html+='</div>';});}else{html+='<div class="card" style="text-align:center;color:var(--mid);padding:40px">Заявок на приёмку нет</div>';}c.innerHTML=html;c.querySelectorAll('[data-action="delete"]').forEach(function(btn){btn.addEventListener('click',function(e){e.stopPropagation();deleteTask(this.getAttribute('data-tid'),'receipt');});});}
async function openReceiptTask(id){  const{data:task}=await sb.from('tasks').select('*,task_items(*,products(name,article))').eq('id',id).single();  if(!task)return;  window._currentTaskId=task.id;  window._currentTaskItems=task.task_items||[];  renderReceiptModal(task);}
function renderReceiptModal(task){  const sC={'Новая':'badge-amber','В работе':'badge-blue','Выполнена':'badge-green'};  const isAdmin=currentUser.user_metadata?.role==='admin';  const isDone=task.status==='Выполнена';  const items=window._currentTaskItems||[];  const pending=items.filter(function(i){return!i.is_collected;});  const done=items.filter(function(i){return i.is_collected;});  let itemsHtml='';  pending.forEach(function(item){    const name=(item.products&&item.products.name)?item.products.name:'—';    const art=(item.products&&item.products.article)?item.products.article:'—';    itemsHtml+='<div id="item-'+item.id+'" style="display:flex;align-items:center;gap:10px;padding:10px;background:#F9F8F6;border-radius:8px;margin-bottom:6px">';    itemsHtml+='<span style="font-size:18px">⬜</span>';    itemsHtml+='<div style="flex:1"><div style="font-weight:600;font-size:13px">'+name+'</div>';    itemsHtml+='<div style="font-size:12px;color:var(--mid)">Арт: '+art+'</div></div>';    itemsHtml+='<div style="font-weight:700;color:#1A1A1A" id="qty-'+item.id+'">'+item.quantity_collected+'/'+item.quantity_required+' шт</div></div>';  });  done.forEach(function(item){    const name=(item.products&&item.products.name)?item.products.name:'—';    const art=(item.products&&item.products.article)?item.products.article:'—';    itemsHtml+='<div id="item-'+item.id+'" style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--green-bg);border-radius:8px;margin-bottom:6px;opacity:0.7">';    itemsHtml+='<span style="font-size:18px">✅</span>';    itemsHtml+='<div style="flex:1"><div style="font-weight:600;font-size:13px">'+name+'</div>';    itemsHtml+='<div style="font-size:12px;color:var(--mid)">Арт: '+art+'</div></div>';    itemsHtml+='<div style="font-weight:700;color:#166534">'+item.quantity_collected+'/'+item.quantity_required+' шт</div></div>';  });  const isNew=task.status==='Новая';  const isInProgress=task.status==='В работе';  let scanner='';  if(isInProgress){    scanner='<div class="scanner-box">';    scanner+='<div style="font-size:13px;font-weight:600;color:rgba(255,255,255,.8);margin-bottom:10px">🔍 Сканирование артикула</div>';    scanner+='<input class="input scanner-input" id="scan-inp" placeholder="Сканируйте или введите артикул..." />';    scanner+='<div style="display:flex;gap:8px;margin-top:10px">';    scanner+='<button class="btn btn-primary" style="flex:1" onclick="doScanReceipt()">Подтвердить</button>';    scanner+='</div><div id="scan-result"></div></div>';  }  let footer='';  if(isNew)footer+='<button class="btn btn-primary" onclick="acceptReceiptTask(window._currentTaskId)">▶ Начать приёмку</button>';  if(isInProgress)footer+='<button class="btn btn-success" onclick="checkAndCompleteReceipt(window._currentTaskId)">✓ Завершить приёмку</button>';  if(isAdmin)footer+='<button class="btn btn-danger" onclick="deleteTask(window._currentTaskId,\"receipt\");closeModal()">🗑️ Удалить</button>';  footer+='<button class="btn btn-secondary" onclick="closeModal()">Закрыть</button>';  openModal('<div class="modal modal-lg">'+    '<div class="modal-title">📥 Приёмка — '+task.request_number+'</div>'+    '<div style="display:flex;gap:16px;margin-bottom:14px;font-size:13px;flex-wrap:wrap">'+    '<div>Статус: <span class="badge '+(sC[task.status]||'badge-gray')+'">'+task.status+'</span></div>'+    '<div>От: <strong>'+(task.created_by_name||'—')+'</strong></div>'+    '<div>Дата: '+fmtDT(task.created_at)+'</div></div>'+    (task.note?'<div class="info-box">📝 '+task.note+'</div>':'')+    '<div style="margin-bottom:14px"><div class="label" style="margin-bottom:8px">Товары к приёмке</div>'+itemsHtml+'</div>'+    scanner+    '<div class="modal-footer">'+footer+'</div></div>');  setTimeout(function(){    const el=document.getElementById('scan-inp');    if(el){el.focus();el.addEventListener('keydown',function(e){if(e.key==='Enter')doScanReceipt();});}  },150);}
async function doScanReceipt(){  const inp=document.getElementById('scan-inp');  const article=(inp?inp.value:'').trim();  if(!article)return;  const res=document.getElementById('scan-result');  const items=window._currentTaskItems||[];  const item=items.find(function(i){return i.products&&i.products.article===article&&!i.is_collected;});  if(!item){    const already=items.find(function(i){return i.products&&i.products.article===article&&i.is_collected;});    if(res)res.innerHTML='<div class="scan-err">❌ '+(already?'Уже полностью принят: <strong>'+article+'</strong>':'Артикул не найден в этой заявке: <strong>'+article+'</strong>')+'</div>';    if(inp){inp.value='';inp.focus();}    return;  }  const newC=item.quantity_collected+1;  const isNowDone=newC>=item.quantity_required;  await sb.from('task_items').update({quantity_collected:newC,is_collected:isNowDone}).eq('id',item.id);  item.quantity_collected=newC;  item.is_collected=isNowDone;  if(isNowDone){    if(res)res.innerHTML='<div class="scan-ok">✅ Полностью принят: <strong>'+item.products.name+'</strong></div>';  } else {    if(res)res.innerHTML='<div class="scan-ok">✅ <strong>'+item.products.name+'</strong> — '+newC+'/'+item.quantity_required+'</div>';  }  const qtyEl=document.getElementById('qty-'+item.id);  const rowEl=document.getElementById('item-'+item.id);  if(isNowDone&&rowEl){    rowEl.style.background='var(--green-bg)';    rowEl.style.opacity='0.7';    rowEl.querySelector('span').textContent='✅';    if(qtyEl){qtyEl.style.color='#166534';}    const container=rowEl.parentNode;    if(container)container.appendChild(rowEl);  } else if(qtyEl){    qtyEl.textContent=newC+'/'+item.quantity_required+' шт';  }  if(inp){inp.value='';inp.focus();}  const allDone=items.every(function(i){return i.is_collected;});  if(allDone){    setTimeout(function(){completeReceiptTask(window._currentTaskId);},800);  }  await sb.from('tasks').update({status:'В работе',started_at:new Date().toISOString()}).eq('id',window._currentTaskId).eq('status','Новая');}
async function checkAndCompleteReceipt(id){  const items=window._currentTaskItems||[];  const notDone=items.filter(function(i){return!i.is_collected;});  if(notDone.length>0){    const notDoneQty=notDone.reduce(function(sum,i){return sum+(i.quantity_required-i.quantity_collected);},0);    openModal('<div class="modal" style="text-align:center;padding:32px">'+      '<div style="font-size:48px;margin-bottom:16px">⚠️</div>'+      '<div style="font-size:17px;font-weight:800;margin-bottom:10px">Не все позиции приняты</div>'+      '<div style="font-size:14px;color:var(--mid);margin-bottom:24px">Осталось принять: <strong style="color:var(--red)">'+notDoneQty+' шт</strong></div>'+      '<div style="display:flex;gap:10px;justify-content:center">'+      '<button class="btn btn-success" onclick="closeModal();completeReceiptTask(window._currentTaskId)">Всё равно завершить</button>'+      '<button class="btn btn-secondary" onclick="closeModal();openReceiptTask(window._currentTaskId)">← Вернуться</button>'+      '</div></div>');    return;  }  await completeReceiptTask(id);}

async function completeReceiptTask(id){const now=new Date().toISOString();const{data:task}=await sb.from('tasks').select('*,task_items(product_id)').eq('id',id).single();const mins=task.started_at?Math.round((new Date(now)-new Date(task.started_at))/60000):null;const prodIds=(task.task_items||[]).map(i=>i.product_id).filter(Boolean);if(prodIds.length)await sb.from('products').update({status:'На складе'}).in('id',prodIds);await sb.from('tasks').update({status:'Выполнена',completed_at:now,executed_by_name:currentUser.user_metadata?.name}).eq('id',id);await sb.from('operations').insert({type:'receipt',started_at:task.started_at,completed_at:now,duration_minutes:mins,created_by_name:task.created_by_name,executed_by_name:currentUser.user_metadata?.name,note:task.request_number});toast('Приёмка завершена! Теперь разместите товары 📍','success');closeModal();await buildSidebar();renderPage('placement');}async function openReceiptForm(){const{data:prods}=await sb.from('products').select('id,name,article');openModal('<div class="modal modal-lg"><div class="modal-title">📥 Приёмка товара</div><div class="form-row"><label class="label">Товар *</label><select class="select" id="rp"><option value="">— выбрать —</option>'+(prods||[]).map(p=>'<option value="'+p.id+'">'+p.name+' ('+p.article+')</option>').join('')+'</select></div><div style="font-size:12px;color:var(--mid);margin:-8px 0 12px">Нет нужного? <a href="#" style="color:var(--gold)" onclick="closeModal();openAddProduct()">Добавить новый</a></div><div class="form-row"><label class="label">Количество</label><input class="input" id="rq" type="number" value="1" min="1" style="max-width:110px"/></div><div class="info-box" style="margin-bottom:14px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px"><div class="label" style="margin-bottom:0">📦 Грузоместа при приёмке</div><button class="btn btn-sm btn-secondary" onclick="addRCargo()">+ Добавить место</button></div><div id="rc-rows"></div></div><div class="form-row"><label class="label">Примечание</label><input class="input" id="rn" placeholder="Откуда пришёл, кто привёз..."/></div><div class="form-row"><label class="label">Фото при приёмке</label><input type="file" id="rf" accept="image/*" multiple class="input" style="padding:7px"/></div><div class="modal-footer"><button class="btn btn-primary" onclick="saveReceipt()">Принять товар</button><button class="btn btn-secondary" onclick="closeModal()">Отмена</button></div></div>');window._rCargo=0;}function addRCargo(){window._rCargo=(window._rCargo||0)+1;const n=window._rCargo;const div=document.createElement('div');div.className='cargo-row';div.id='rcr-'+n;div.innerHTML='<div class="cargo-num">'+n+'</div><input class="input" placeholder="Описание места" id="rcd-'+n+'" style="flex:1"/><button class="btn btn-sm btn-danger" onclick="document.getElementById(\'rcr-'+n+'\').remove()">✕</button>';document.getElementById('rc-rows').appendChild(div);}async function saveReceipt(){const prodId=document.getElementById('rp').value;if(!prodId){toast('Выберите товар','error');return;}const qty=parseInt(document.getElementById('rq').value)||1;const note=document.getElementById('rn').value;const now=new Date().toISOString();const{data:op}=await sb.from('operations').insert({type:'receipt',product_id:prodId,quantity:qty,note,started_at:now,completed_at:now,executed_by_name:currentUser.user_metadata?.name}).select().single();const total=window._rCargo||0;for(let i=1;i<=total;i++){const row=document.getElementById('rcr-'+i);if(!row)continue;await sb.from('cargo_places').insert({product_id:prodId,operation_id:op.id,place_number:i,total_places:total,description:document.getElementById('rcd-'+i)?.value||'',is_scanned:true});}const files=document.getElementById('rf').files;for(const file of files){const fd=new FormData();fd.append('file',file);fd.append('upload_preset',CLOUDINARY_PRESET);const res=await fetch('https://api.cloudinary.com/v1_1/'+CLOUDINARY_CLOUD+'/image/upload', Date(inv.created_at)+'</strong>'+(inv.counterparty?' | Контрагент: <strong>'+inv.counterparty+'</strong>':'')+'</p><table><thead><tr><th>№</th><th>Наименование</th><th>Артикул</th><th>Кол-во</th><th>Примечание</th></tr></thead><tbody>'+[1,2,3,4,5,6].map(i=>'<tr><td>'+i+'</td><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td><td>&nbsp;</td></tr>').join('')+'</tbody></table><div class="footer"><div><div class="sign">Сдал: _______________ / ___________<br>ФИО / Подпись</div></div><div><div class="sign">Принял: _______________ / ___________<br>ФИО / Подпись</div></div><div><div class="sign">Дата: _______________</div></div></div><script>window.print();window.close();<\/script></body></html>');w.document.close();}async function renderAnalytics(c){const{data:ops}=await sb.from('operations').select('*').order('created_at',{ascending:false});const tL={receipt:'Приёмка',shipment:'Отгрузка',placement:'Размещение',move:'Перемещение',writeoff:'Списание'};const byType={};(ops||[]).forEach(o=>{if(!byType[o.type])byType[o.type]={count:0,qty:0,mins:[]};byType[o.type].count++;byType[o.type].qty+=(o.quantity||0);if(o.duration_minutes)byType[o.type].mins.push(o.duration_minutes);});c.innerHTML='<div class="page-title">📈 Аналитика</div><div class="stat-grid">'+Object.entries(byType).map(([type,s])=>'<div class="stat-card"><div class="stat-num">'+s.count+'</div><div class="stat-label">'+(tL[type]||type)+'</div>'+(s.mins.length?'<div style="font-size:11px;color:var(--mid);margin-top:4px">⏱ Среднее: '+Math.round(s.mins.reduce((a,b)=>a+b,0)/s.mins.length)+' мин</div>':'')+'</div>').join('')+'</div><div class="card"><div style="font-size:15px;font-weight:700;margin-bottom:14px">Все операции</div><div class="table-wrap"><table class="table"><thead><tr><th>Тип</th><th>Дата</th><th>Запросил</th><th>Выполнил</th><th>Кол-во</th><th>Время (мин)</th></tr></thead><tbody>'+(ops||[]).slice(0,40).map(o=>'<tr><td><span class="badge badge-gray">'+(tL[o.type]||o.type)+'</span></td><td>'+fmtDT(o.created_at)+'</td><td>'+(o.created_by_name||'—')+'</td><td>'+(o.executed_by_name||'—')+'</td><td>'+(o.quantity||'—')+'</td><td>'+(o.duration_minutes?'<strong>'+o.duration_minutes+'</strong>':'—')+'</td></tr>').join('')+'</tbody></table></div></div>';}async function renderRollback(c){const{data:ops}=await sb.from('operations').select('*,products(name,article)').order('created_at',{ascending:false}).limit(50);c.innerHTML='<div class="page-title">↩️ Откат операций</div><div style="background:var(--red-bg);border-radius:10px;padding:12px;margin-bottom:20px;font-size:13px;color:#991B1B">⚠️ <strong>Только для администратора.</strong> Откат изменяет данные. Используйте осторожно.</div><div class="card"><div class="table-wrap"><table class="table"><thead><tr><th>Дата</th><th>Тип</th><th>Товар</th><th>Кто</th><th></th></tr></thead><tbody>'+(ops||[]).map(o=>'<tr><td>'+fmtDT(o.created_at)+'</td><td><span class="badge badge-gray">'+o.type+'</span></td><td style="font-weight:600">'+(o.products?.name||'—')+'</td><td>'+(o.executed_by_name||'—')+'</td><td><button class="btn btn-sm btn-danger" onclick="rollback(\''+o.id+'\',\''+o.type+'\',\''+(o.product_id||'')+'\',\''+(o.to_cell_id||'')+'\',\''+(o.from_cell_id||'')+'\')">↩️ Откатить</button></td></tr>').join('')+'</tbody></table></div></div>';}async function rollback(opId,type,prodId,toCellId,fromCellId){const reason=prompt('Причина отката:');if(reason===null)return;await sb.from('rollback_history').insert({operation_id:opId,rolled_back_by:currentUser.user_metadata?.name,reason});if(type==='shipment'&&prodId)await sb.from('products').update({status:'На складе'}).eq('id',prodId);if(type==='placement'&&prodId){await sb.from('products').update({cell_id:null}).eq('id',prodId);if(toCellId)await sb.from('cells').update({is_occupied:false}).eq('id',toCellId);}if(type==='move'&&prodId&&fromCellId){await sb.from('products').update({cell_id:fromCellId}).eq('id',prodId);if(toCellId)await sb.from('cells').update({is_occupied:false}).eq('id',toCellId);await sb.from('cells').update({is_occupied:true}).eq('id',fromCellId);}if(type==='writeoff'&&prodId)await sb.from('products').update({status:'На складе'}).eq('id',prodId);await sb.from('operations').delete().eq('id',opId);toast('Операция откатана!');renderPage('rollback');}async function renderRequests(c){const{data:tasks}=await sb.from('tasks').select('*').eq('created_by_name',currentUser.user_metadata?.name).order('created_at',{ascending:false});const tL={receipt:'Приёмка',shipment:'Отгрузка',writeoff:'Списание'};const isAdmin=currentUser.user_metadata?.role==='admin';c.innerHTML='<div class="page-title">📝 Мои заявки</div>'+(tasks&&tasks.length?'<div class="card"><div class="table-wrap"><table class="table"><thead><tr><th>№ Заявки</th><th>Тип</th><th>Дата</th><th>Статус</th>'+(isAdmin?'<th></th>':'')+'</tr></thead><tbody>'+tasks.map(t=>'<tr><td style="font-weight:700;font-family:monospace">'+t.request_number+'</td><td>'+(tL[t.type]||t.type)+'</td><td>'+fmtDT(t.created_at)+'</td><td>'+(t.status==='Выполнена'?'<span class="status-ok">✓</span>':t.status==='Новая'?'<span class="status-pend">⏳</span>':'<span class="status-err">✕</span>')+' '+t.status+'</td>'+(isAdmin?'<td><button class="btn btn-sm btn-danger" onclick="deleteTask(\''+t.id+'\',\'requests\')">🗑️</button></td>':'')+'</tr>').join('')+'</tbody></table></div></div>':'<div class="card" style="text-align:center;color:var(--mid);padding:40px">Заявок пока нет</div>');}async function renderShipmentsView(c){const{data:ops}=await sb.from('operations').select('*,products(name,article)').eq('type','shipment').order('created_at',{ascending:false});c.innerHTML='<div class="page-title">📤 История отгрузок</div><div class="card"><div class="table-wrap"><table class="table"><thead><tr><th>Дата</th><th>Товар</th><th>Кол-во</th><th>Куда/Кому</th><th>Отгрузил</th><th>Накладная</th></tr></thead><tbody>'+(ops||[]).map(o=>'<tr><td>'+fmtDT(o.created_at)+'</td><td style="font-weight:600">'+(o.products?.name||'—')+'</td><td>'+(o.quantity||1)+'</td><td>'+(o.note||'—')+'</td><td>'+(o.executed_by_name||'—')+'</td><td style="font-size:12px">'+(o.invoice_number||'—')+'</td></tr>').join('')+'</tbody></table></div></div>';}
async function renderNewReceiptReq(c){  const cats=await getCats();  window._receiptCats=cats;  const{data:prevTasks}=await sb.from('tasks').select('*').eq('type','receipt').eq('created_by_name',currentUser.user_metadata?.name).order('created_at',{ascending:false}).limit(5);  let prevHtml='';  if(prevTasks&&prevTasks.length){    prevHtml='<div style="margin-top:24px"><div class="label" style="margin-bottom:10px">Последние заявки</div>';    prevTasks.forEach(function(t){      const sc=t.status==='Выполнена'?'badge-green':t.status==='Новая'?'badge-amber':'badge-blue';      prevHtml+='<div style="display:flex;justify-content:space-between;padding:10px;background:#F9F8F6;border-radius:8px;margin-bottom:6px;font-size:13px">';      prevHtml+='<span style="font-weight:700;font-family:monospace">'+t.request_number+'</span>';      prevHtml+='<span>'+fmtDT(t.created_at)+'</span>';      prevHtml+='<span class="badge '+sc+'">'+t.status+'</span></div>';    });    prevHtml+='</div>';  }  let html='<div class="page-title">📥 Заявка на приёмку';  html+='<div style="position:relative">';  html+='<button class="btn btn-primary btn-sm" onclick="toggleReqMenu(\'receipt-menu\')">+ Создать заявку ▾</button>';  html+='<div id="receipt-menu" style="display:none;position:absolute;right:0;top:110%;background:#fff;border:1px solid #E5E7EB;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.12);z-index:100;min-width:200px;overflow:hidden">';  html+='<button class="dropdown-item" onclick="toggleReqMenu(\'receipt-menu\');openManualReceiptForm()">📝 Создать вручную</button>';  html+='<button class="dropdown-item" onclick="toggleReqMenu(\'receipt-menu\');importExcel()">📂 Загрузить файл</button>';  html+='</div></div></div>'+prevHtml;  c.innerHTML=html;}
