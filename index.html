<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gridvo — Склад Мардакян</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#D8EDE6;color:#1A2E28;min-height:100vh}
:root{
  --bg:#D8EDE6;--bg2:#2A3D35;--bg3:#354A42;
  --accent:#00D26A;--accent2:#00A854;--accent-g:linear-gradient(135deg,#00D26A,#00A854);
  --green:#00D26A;--red:#EF4444;--amber:#F59E0B;
  --text:#1A2E28;--mid:#4A7066;--border:#B8D8CE;
  --sidebar:240px;
}
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#D8EDE6}
.auth-box{background:#fff;border-radius:20px;padding:44px;width:400px;box-shadow:0 20px 60px rgba(0,0,0,0.15);border:1px solid var(--border)}
.auth-logo{font-size:28px;font-weight:800;margin-bottom:6px;color:var(--accent)}
.auth-sub{font-size:13px;color:var(--mid);margin-bottom:32px}
.auth-tabs{display:flex;gap:0;margin-bottom:24px;background:var(--bg);border-radius:10px;padding:3px}
.auth-tab{flex:1;padding:9px;border:none;background:none;cursor:pointer;border-radius:8px;font-size:13px;font-weight:600;color:var(--mid);transition:.2s}
.auth-tab.active{background:var(--bg2);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,0.3)}
#app{display:none;min-height:100vh;background:#D8EDE6}
.topbar{background:#C5E0D8;border-bottom:1px solid #B0CFC7;height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:fixed;top:0;left:0;right:0;z-index:200}
.topbar-logo{font-size:18px;font-weight:800;color:#00A854;letter-spacing:-0.5px}
.topbar-right{display:flex;align-items:center;gap:10px;color:#00A854}
.topbar-role{font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;background:rgba(0,168,84,.15);color:#00A854;cursor:pointer;transition:.2s;border:1px solid rgba(0,168,84,.3)}
.topbar-role:hover{background:var(--accent);color:#fff}
.sidebar{position:fixed;top:58px;left:0;bottom:0;width:var(--sidebar);background:#C5E0D8;border-right:1px solid #B0CFC7;overflow-y:auto;padding:12px 8px;z-index:100}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;border:none;background:none;color:#1A3028;cursor:pointer;width:100%;text-align:left;transition:.2s;margin-bottom:2px;position:relative}
.nav-item:hover{background:rgba(0,180,90,.15);color:#00A854}
.nav-item.active{background:rgba(0,180,90,.2);color:#00A854;border-left:3px solid #00A854;font-weight:700}
.nav-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--bg3);filter:drop-shadow(0 1px 3px rgba(0,0,0,.3))}
.nav-item.active .nav-icon{background:rgba(255,255,255,.15)}
.nav-text{font-size:13px;font-weight:600;color:#1A3028}
.nav-badge{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px;min-width:18px;text-align:center}
.nav-section{font-size:10px;font-weight:700;color:#3A7060;text-transform:uppercase;letter-spacing:.08em;padding:16px 12px 6px}
.main-content{margin-left:var(--sidebar);padding-top:58px;min-height:100vh}
.page-wrap{padding:24px}
.page-title{font-size:20px;font-weight:700;color:#1A2E28;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.card{background:#fff;border-radius:14px;padding:20px;border:1px solid var(--border);margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.table-wrap{overflow-x:auto}
.table{width:100%;border-collapse:collapse}
.table th{font-size:11px;font-weight:600;color:#4A7066;text-transform:uppercase;letter-spacing:.05em;padding:10px 12px;border-bottom:1px solid var(--border);text-align:left}
.table td{padding:12px;border-bottom:1px solid #E8F0ED;font-size:13px;color:#1A2E28}
.table tr:last-child td{border-bottom:none}
.table tr:hover td{background:#EAF5F0}
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:.2s}
.btn-primary{background:var(--accent-g);color:#fff}
.btn-primary:hover{opacity:.9}
.btn-secondary{background:rgba(0,168,84,.1);color:#00A854;border:1px solid rgba(0,168,84,.2)}
.btn-secondary:hover{background:var(--border)}
.btn-danger{background:var(--red);color:#fff}
.btn-success{background:var(--green);color:#fff}
.btn-sm{padding:5px 10px;font-size:12px}
.badge{display:inline-block;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600}
.badge-green{background:rgba(16,185,129,.15);color:#10B981}
.badge-red{background:rgba(239,68,68,.15);color:#EF4444}
.badge-blue{background:rgba(59,130,246,.15);color:#60A5FA}
.badge-amber{background:rgba(245,158,11,.15);color:#F59E0B}
.badge-gray{background:var(--bg3);color:var(--mid)}
.input{width:100%;padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:#fff;color:#1A2E28;font-size:13px;outline:none;transition:.2s}
.input:focus{border-color:var(--accent)}
.input::placeholder{color:var(--mid)}
.select{width:100%;padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:#fff;color:#1A2E28;font-size:13px;outline:none}
.label{font-size:12px;font-weight:600;color:var(--mid);margin-bottom:6px;display:block}
.form-row{margin-bottom:14px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:.2s}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal{background:#fff;border-radius:16px;padding:28px;width:100%;max-width:520px;border:1px solid var(--border);max-height:90vh;overflow-y:auto}
.modal-lg{max-width:700px}
.modal-title{font-size:17px;font-weight:700;margin-bottom:20px;color:#1A2E28}
.modal-footer{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;transition:.3s;opacity:0;transform:translateY(10px)}
.toast.show{opacity:1;transform:translateY(0)}
.toast.success{background:var(--green);color:#fff}
.toast.error{background:var(--red);color:#fff}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-bottom:20px}
.stat-card{background:var(--bg2);border-radius:14px;padding:18px;border:1px solid var(--border);text-align:center}
.stat-num{font-size:32px;font-weight:800;color:var(--accent)}
.stat-label{font-size:12px;color:var(--mid);margin-top:4px}
.task-card{background:#fff;border-radius:12px;padding:16px;border:1px solid var(--border);margin-bottom:12px;cursor:pointer;transition:.2s;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.task-card:hover{border-color:var(--accent);background:#EAF5F0}
.task-card.new{border-left:3px solid var(--amber)}
.task-card.done{opacity:.6}
.progress-bar{height:4px;background:var(--bg3);border-radius:2px;margin:8px 0;overflow:hidden}
.progress-fill{height:100%;background:var(--accent-g);border-radius:2px;transition:.3s}
.progress-fill.done{background:var(--green)}
.scanner-box{background:var(--bg);border-radius:12px;padding:16px;margin-bottom:16px;border:1px solid var(--border)}
.scan-ok{color:var(--green);font-size:13px;font-weight:600;margin-top:8px;padding:8px 12px;background:rgba(16,185,129,.1);border-radius:8px}
.scan-err{color:var(--red);font-size:13px;font-weight:600;margin-top:8px;padding:8px 12px;background:rgba(239,68,68,.1);border-radius:8px}
.info-box{background:var(--bg3);border-radius:10px;padding:12px;font-size:13px;margin-bottom:14px;color:var(--mid)}
.dropdown-item{display:block;width:100%;padding:12px 16px;text-align:left;background:none;border:none;cursor:pointer;font-size:13px;color:var(--text);transition:.15s}
.dropdown-item:hover{background:var(--bg3)}
.cargo-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.cargo-num{width:28px;height:28px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.status-ok{color:var(--green);font-weight:700}
.status-pend{color:var(--amber);font-weight:700}
.status-err{color:var(--red);font-weight:700}
.manual-row{display:grid;grid-template-columns:2fr 1fr 1fr 70px 1fr 2fr 30px;gap:6px;margin-bottom:6px;align-items:center}
@media(max-width:768px){
  .sidebar{width:100%;top:auto;bottom:0;height:64px;border-right:none;border-top:1px solid var(--border);display:flex;padding:4px 8px;flex-direction:row;overflow-x:auto}
  .nav-item{flex-direction:column;gap:2px;padding:6px;min-width:56px;margin-bottom:0}
  .nav-text{font-size:9px}
  .nav-section{display:none}
  .main-content{margin-left:0;padding-bottom:70px}
}
@media print{.sidebar,.topbar,.no-print{display:none!important}.main-content{margin:0!important;padding:20px!important}}
</style>
</head>
<body>
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">Gridvo</div>
    <div class="auth-sub">Склад Мардакян — система управления</div>
    <div style="margin-bottom:20px;font-size:13px;color:var(--mid)">Войдите в систему</div>
    <div id="login-form">
      <div class="form-row"><label class="label">Email</label><input class="input" id="login-email" type="email" placeholder="your@email.com"/></div>
      <div class="form-row"><label class="label">Пароль</label><input class="input" id="login-pass" type="password" placeholder="••••••••"/></div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:4px" onclick="doLogin()">Войти →</button>
    </div>
  </div>
</div>
<div id="app">
  <div class="topbar no-print">
    <div class="topbar-logo">Gridvo <span style="font-size:11px;font-weight:400;opacity:.5">Мардакян</span></div>
    <div class="topbar-right">
      <span id="header-username" style="font-size:13px;color:#00A854;font-weight:600"></span>
      <span class="topbar-role" id="header-role" onclick="openRoleSwitcher()" title="Сменить роль"></span>
      <button class="btn btn-sm btn-secondary" onclick="logout()">Выйти</button>
    </div>
  </div>
  <div class="sidebar no-print" id="sidebar"></div>
  <div class="main-content">
    <div class="page-wrap" id="page-content"></div>
  </div>
</div>
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-content"></div>
</div>
<div class="toast hidden" id="toast"></div>
<script src="./app.js"></script>
</body>
</html>
