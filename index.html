<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gridvo — Склад Мардакян</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#F0EFEC;color:#1A1A1A;min-height:100vh}
:root{--gold:#C9A84C;--gold-light:#F5EDD6;--dark:#1A1A1A;--mid:#6B7280;--border:#E5E3DF;--red:#EF4444;--green:#22C55E;--red-bg:#FEE2E2;--green-bg:#DCFCE7;--blue-bg:#DBEAFE;--amber-bg:#FEF3C7;--sidebar:250px;}
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#1A1A1A}
.auth-box{background:#fff;border-radius:16px;padding:40px;width:380px;box-shadow:0 8px 40px rgba(0,0,0,0.3)}
.auth-logo{font-size:24px;font-weight:800;margin-bottom:4px}
.auth-logo span{color:var(--gold)}
.auth-sub{font-size:13px;color:var(--mid);margin-bottom:28px}
.auth-tabs{display:flex;gap:0;margin-bottom:24px;background:#F0EFEC;border-radius:8px;padding:3px}
.auth-tab{flex:1;padding:8px;border:none;background:none;cursor:pointer;border-radius:6px;font-size:13px;font-weight:600;color:var(--mid)}
.auth-tab.active{background:#fff;color:#1A1A1A;box-shadow:0 1px 4px rgba(0,0,0,0.1)}
#app{display:none;min-height:100vh}
.topbar{background:#BFDBFE;color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:fixed;top:0;left:0;right:0;z-index:200}
.topbar-logo{font-size:16px;font-weight:800;color:#1A1A1A}
.topbar-logo span{color:var(--gold)}
.topbar-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;color:#1A1A1A}
.topbar-role{font-size:11px;background:var(--gold);color:#fff;padding:2px 8px;border-radius:99px;font-weight:600}
.btn-excel{padding:7px 12px;border-radius:7px;border:none;cursor:pointer;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:4px}
.btn-excel-imp{background:#1D6F42;color:#fff}
.dropdown-item{display:block;width:100%;padding:12px 16px;text-align:left;background:none;border:none;cursor:pointer;font-size:14px;color:#1A1A1A;transition:background .15s}
.dropdown-item:hover{background:#F3F4F6}
.btn-excel-exp{background:#217346;color:#fff}
.sidebar{position:fixed;top:56px;left:0;bottom:0;width:var(--sidebar);background:#fff;border-right:1px solid var(--border);overflow-y:auto;z-index:100;padding:12px 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;cursor:pointer;border:none;background:none;width:100%;text-align:left;font-family:'Inter',sans-serif;margin:1px 8px;width:calc(100% - 16px)}
.nav-item:hover{background:#F0EFEC}
.nav-item.active{background:var(--gold-light)}
.nav-icon{width:34px;height:34px;border-radius:8px;background:#F0EFEC;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.nav-item.active .nav-icon{background:var(--gold);color:#fff}
.nav-text{font-size:13px;font-weight:600;color:#1A1A1A}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;border-radius:99px;font-size:11px;font-weight:700;padding:1px 7px}
.main-content{margin-top:56px;margin-left:var(--sidebar);padding:24px;min-height:calc(100vh - 56px)}
.card{background:#fff;border-radius:12px;padding:22px;box-shadow:0 1px 4px rgba(0,0,0,0.06);margin-bottom:20px}
.page-title{font-size:20px;font-weight:800;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.btn{padding:9px 18px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:opacity .15s;display:inline-flex;align-items:center;gap:6px;font-family:'Inter',sans-serif}
.btn:hover{opacity:.85}
.btn-primary{background:var(--gold);color:#fff}
.btn-secondary{background:#F3F4F6;color:#374151}
.btn-danger{background:var(--red-bg);color:var(--red)}
.btn-success{background:var(--green-bg);color:#166534}
.btn-sm{padding:6px 12px;font-size:12px}
.input{width:100%;padding:10px 12px;border-radius:8px;border:1.5px solid var(--border);font-size:13px;font-family:'Inter',sans-serif;outline:none;background:#fff;transition:border-color .15s}
.input:focus{border-color:var(--gold)}
.select{width:100%;padding:10px 12px;border-radius:8px;border:1.5px solid var(--border);font-size:13px;font-family:'Inter',sans-serif;background:#fff;outline:none}
.label{font-size:12px;font-weight:600;color:var(--mid);margin-bottom:5px;display:block}
.form-row{margin-bottom:14px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.table-wrap{overflow-x:auto}
.table{width:100%;border-collapse:collapse;font-size:13px}
.table th{text-align:left;padding:10px 14px;border-bottom:2px solid #F0EFEC;color:var(--mid);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
.table td{padding:11px 14px;border-bottom:1px solid #F9F8F6;vertical-align:middle}
.table tr:hover td{background:#FAFAF9}
.badge{padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;display:inline-flex;align-items:center;gap:4px}
.badge-green{background:var(--green-bg);color:#166534}
.badge-red{background:var(--red-bg);color:#991B1B}
.badge-blue{background:var(--blue-bg);color:#1E40AF}
.badge-amber{background:var(--amber-bg);color:#92400E}
.badge-gray{background:#F3F4F6;color:var(--mid)}
.badge-gold{background:var(--gold-light);color:#92400E}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:12px;padding:16px;border-left:4px solid var(--gold);box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.stat-num{font-size:28px;font-weight:800;line-height:1}
.stat-label{font-size:12px;color:var(--mid);margin-top:4px;font-weight:500}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:16px;padding:28px;width:min(600px,100%);max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,0.2)}
.modal-lg{width:min(780px,100%)}
.modal-title{font-size:17px;font-weight:800;margin-bottom:20px}
.modal-footer{display:flex;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border);flex-wrap:wrap}
.photos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(76px,1fr));gap:8px}
.photo-thumb{width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px;cursor:pointer;border:2px solid transparent}
.photo-thumb:hover{border-color:var(--gold)}
.photo-upload-btn{width:100%;aspect-ratio:1;border:2px dashed var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--mid);font-size:22px;background:none}
.photo-upload-btn:hover{border-color:var(--gold);color:var(--gold)}
.task-card{background:#fff;border-radius:12px;padding:16px;border-left:4px solid var(--gold);box-shadow:0 1px 4px rgba(0,0,0,0.06);margin-bottom:12px;cursor:pointer;transition:box-shadow .15s}
.task-card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.1)}
.task-card.new{border-color:var(--red)}
.task-card.done{opacity:.65}
.cargo-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding:10px;background:#F9F8F6;border-radius:8px}
.cargo-num{width:34px;height:34px;border-radius:8px;background:var(--gold);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.progress-bar{height:7px;background:#F0EFEC;border-radius:99px;overflow:hidden;margin:8px 0}
.progress-fill{height:100%;background:var(--gold);border-radius:99px;transition:width .3s}
.progress-fill.done{background:var(--green)}
.scanner-box{background:#1A1A1A;border-radius:12px;padding:18px;margin-bottom:14px}
.scanner-input{background:#2A2A2A;border:2px solid #444;color:#fff;font-size:16px;font-family:monospace;text-align:center}
.scanner-input:focus{border-color:var(--gold)}
.scan-ok{background:var(--green-bg);border:2px solid #22C55E;border-radius:8px;padding:12px;margin-top:10px;font-size:13px}
.scan-err{background:var(--red-bg);border:2px solid var(--red);border-radius:8px;padding:12px;margin-top:10px;font-size:13px}
.status-ok{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:var(--green-bg);color:#166534;font-size:13px;font-weight:700}
.status-err{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:var(--red-bg);color:#991B1B;font-size:13px;font-weight:700}
.status-pend{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:var(--amber-bg);color:#92400E;font-size:12px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1A1A1A;color:#fff;padding:11px 22px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,0.25);transition:opacity .3s;max-width:380px;text-align:center}
.toast.error{background:#B91C1C}
.toast.success{background:#166534}
.toast.hidden{opacity:0}
.info-box{background:#F9F8F6;border-radius:8px;padding:12px;font-size:13px;margin-bottom:14px}
@media(max-width:768px){
  .sidebar{width:100%;top:auto;bottom:0;height:64px;border-left:none;border-top:1px solid var(--border);display:flex;overflow-x:auto;padding:6px;flex-direction:row;align-items:center}
  .nav-item{flex-direction:column;gap:2px;padding:6px;min-width:60px;width:auto;margin:0 2px}
  .nav-text{font-size:10px}
  .nav-icon{width:26px;height:26px;font-size:13px}
  .main-content{margin-right:0;margin-bottom:70px;padding:16px}
  .form-grid{grid-template-columns:1fr}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .topbar-right .btn-excel{display:none}
}
@media print{.sidebar,.topbar,.no-print{display:none!important}.main-content{margin:0!important;padding:20px!important}}
</style>
</head>
<body>
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">Grid<span>vo</span></div>
    <div class="auth-sub">Склад Мардакян — система управления</div>
    <div style="margin-bottom:20px;font-size:13px;color:var(--mid)">Войдите в систему</div>
    <div id="login-form">
      <div class="form-row"><label class="label">Email</label><input class="input" id="login-email" type="email" placeholder="your@email.com"/></div>
      <div class="form-row"><label class="label">Пароль</label><input class="input" id="login-pass" type="password" placeholder="••••••••"/></div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:4px" onclick="login()">Войти →</button>
    </div>
    </div>
</div>

<div id="app">
  <div class="topbar no-print">
    <div class="topbar-logo">Grid<span>vo</span> <span style="font-weight:400;opacity:.4;font-size:11px">Мардакян</span></div>
    <div class="topbar-right">
      <span id="header-username" style="font-size:13px;color:#1A1A1A"></span>
      <span class="topbar-role" id="header-role" style="cursor:pointer" onclick="openRoleSwitcher()" title="Нажмите для смены роли"></span>
      <button class="btn btn-sm" style="background:rgba(255,255,255,.12);color:#fff;border:none" onclick="logout()">Выйти</button>
    </div>
  </div>
  <div class="sidebar no-print" id="sidebar"></div>
  <div class="main-content">
    <div id="page-content"></div>
  </div>
</div>
<div id="modal-container"></div>
<div class="toast hidden" id="toast"></div>
<script src="./app.js"></script>
</body>
</html>
